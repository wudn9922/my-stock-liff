<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬量化清單</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; margin: 10px; min-width: 300px; vertical-align: top; }
        img { border-radius: 50%; width: 60px; height: 60px; margin-bottom: 10px; }
        code { background: #eee; padding: 3px 6px; border-radius: 4px; color: #d63384; font-size: 14px; }
        
        .form-group { margin: 15px 0; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <h2>📊 我的專屬量化看盤室</h2>
    
    <div class="card" id="profile-card">
        <p>ℹ️ 本地測試模式（未登入 LINE）</p>
    </div>

    <div class="card">
        <h3>➕ 新增觀察股票</h3>
        <div class="form-group">
            <label>股票代碼 (台股請加 .TW)</label>
            <input type="text" id="ticker-input" placeholder="例如: 2330.TW 或 NVDA" value="2330.TW">
        </div>
        <div class="form-group">
            <label>短期均線天數 (MA 1)</label>
            <input type="number" id="ma1-input" value="20">
        </div>
        <div class="form-group">
            <label>長期均線天數 (MA 2)</label>
            <input type="number" id="ma2-input" value="60">
        </div>
        <button class="btn" id="add-btn" onclick="addStock()">加入我的清單</button>
    </div>

    <br>

    <div class="card" style="width: 90%; max-width: 650px;">
        <h3>📋 我的自訂觀察清單</h3>
        <table>
            <thead>
                <tr>
                    <th>股票代碼</th>
                    <th>目前價格</th>
                    <th>短均狀態</th>
                    <th>長均狀態</th>
                    <th>多空判定</th>
                </tr>
            </thead>
            <tbody id="stock-table-body">
                <tr id="empty-row">
                    <td colspan="5" style="color: gray;">目前清單空空如也，請從上方新增股票</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // ⚠️ 記得替換成你的真實 LIFF ID ⚠️
        const LIFF_ID = "2010330411-SbwvRXRN";

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById("profile-card").innerHTML = `
                        <img src="${profile.pictureUrl}" alt="大頭貼">
                        <h4>你好，${profile.displayName}</h4>
                    `;
                }
            } catch (err) {
                console.log("LIFF 初始化跳過（本地檔案環境）");
            }
        }

        // 🟢 核心改動：按下按鈕後，真正發送請求給本地 Python 大腦
        async function addStock() {
            const ticker = document.getElementById("ticker-input").value.trim();
            const ma1 = document.getElementById("ma1-input").value;
            const ma2 = document.getElementById("ma2-input").value;
            
            if(!ticker) {
                alert("請輸入股票代碼！");
                return;
            }
            
            // 讓按鈕變成轉圈載入狀態，防止重複點擊
            const btn = document.getElementById("add-btn");
            btn.innerText = "大腦計算中...";
            btn.disabled = true;
            
            try {
                // 1. 呼叫我們剛剛測試成功的本地 Python 網址
                const response = await fetch(`https://819a2153147f3517-123-192-193-19.serveousercontent.com/api/analyze?ticker=${ticker}&ma1=${ma1}&ma2=${ma2}`);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    alert(errorData.detail || "抓取失敗，請檢查代碼是否正確");
                    return;
                }
                
                // 2. 解析 Python 回傳的 JSON 資料
                const data = await response.json();
                
                // 3. 如果是第一次加股票，把「空空如也」的那一行移除
                const emptyRow = document.getElementById("empty-row");
                if (emptyRow) {
                    emptyRow.remove();
                }
                
                // 4. 動態新增一行表格紀錄
                const tableBody = document.getElementById("stock-table-body");
                const newRow = document.createElement("tr");
                
                // 根據多空狀態決定字的顏色
                const statusColor = data.status.includes("🟢") ? "#28a745" : "#dc3545";
                
                newRow.innerHTML = `
                    <td><b>${data.ticker}</b></td>
                    <td>$${data.latest_price}</td>
                    <td>${data.ma1_value} <small>(${data.ma1_setting}MA)</small></td>
                    <td>${data.ma2_value} <small>(${data.ma2_setting}MA)</small></td>
                    <td style="color: ${statusColor}; font-weight: bold;">${data.status}</td>
                `;
                
                tableBody.appendChild(newRow);
                
            } catch (err) {
                console.error(err);
                alert("無法連線到 Python 大腦，請確保黑視窗（Uvicorn）還在執行中！");
            } finally {
                // 恢復按鈕狀態
                btn.innerText = "加入我的清單";
                btn.disabled = false;
            }
        }

        window.onload = initializeLiff;
    </script>

</body>
</html>
